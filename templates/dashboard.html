<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Smart Task Manager</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="dashboard-page">
    <!-- Navbar -->
    <nav class="navbar">
        <div class="navbar-brand">
            <div class="navbar-logo">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4" />
                </svg>
            </div>
            <h1>Smart Task Manager</h1>
        </div>
        <div class="navbar-user">
            <div class="user-info">
                <div class="user-avatar">{{ current_user.username[0] | upper }}</div>
                <span class="user-name">{{ current_user.username }}</span>
            </div>
            <a href="{{ url_for('routes.logout') }}" class="btn-logout">Logout</a>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Welcome Section -->
        <div class="welcome-section">
            <h2>Welcome back, {{ current_user.username }}!</h2>
            <p>Here is your task overview for today</p>
        </div>

        <!-- Stats Grid -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon blue">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" />
                    </svg>
                </div>
                <div class="stat-info">
                    <h3 id="stat-total">0</h3>
                    <p>Total Tasks</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon green">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                </div>
                <div class="stat-info">
                    <h3 id="stat-completed">0</h3>
                    <p>Completed</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon orange">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                </div>
                <div class="stat-info">
                    <h3 id="stat-pending">0</h3>
                    <p>Pending</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon purple">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M11 3.055A9.001 9.001 0 1020.945 13H11V3.055z" />
                        <path stroke-linecap="round" stroke-linejoin="round" d="M20.488 9H15V3.512A9.025 9.025 0 0120.488 9z" />
                    </svg>
                </div>
                <div class="stat-info">
                    <h3 id="stat-percentage">0%</h3>
                    <p>Completion Rate</p>
                </div>
            </div>
        </div>

        <div id="notification-area"></div>

        <!-- Content Grid -->
        <div class="content-grid">
            <!-- Tasks List -->
            <div class="card">
                <div class="card-header">
                    <h3>
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 10h16M4 14h16M4 18h16" />
                        </svg>
                        Your Tasks
                    </h3>
                </div>
                <div class="card-body" style="padding: 0;">
                    <div class="tasks-table-wrapper">
                        <table class="tasks-table">
                            <thead>
                                <tr>
                                    <th>Task</th>
                                    <th>Priority</th>
                                    <th>Status</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="tasks-tbody">
                                <!-- Tasks will be injected here via JS -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- Add Task Form -->
            <div class="card">
                <div class="card-header">
                    <h3>
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
                        </svg>
                        Add New Task
                    </h3>
                </div>
                <div class="card-body">
                    <form id="add-task-form" class="add-task-form">
                        <div class="form-group">
                            <label for="title">Task Title</label>
                            <input type="text" id="title" name="title" placeholder="Enter task title" required>
                        </div>
                        <div class="form-group">
                            <label for="description">Description</label>
                            <textarea id="description" name="description" placeholder="Enter task description" rows="3"></textarea>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="priority">Priority</label>
                                <select id="priority" name="priority" required>
                                    <option value="Low">Low</option>
                                    <option value="Medium" selected>Medium</option>
                                    <option value="High">High</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="status">Status</label>
                                <select id="status" name="status" required>
                                    <option value="Pending" selected>Pending</option>
                                    <option value="In Progress">In Progress</option>
                                    <option value="Completed">Completed</option>
                                </select>
                            </div>
                        </div>
                        <button type="button" onclick="submitNewTask()" class="btn btn-success" style="width: 100%;">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="width: 18px; height: 18px;">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
                            </svg>
                            Add Task
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js" integrity="sha512-q/dWJ3kcmjXXD4sQ9/jA8D0h2bQeLzXw7b5n7t2bHlGIf2esYn/Y5U/wT0V2/cIksW6jY7Z1I+c3KjOQvE4/qw==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script>
        function showNotification(msg) {
            const area = document.getElementById('notification-area');
            const notif = document.createElement('div');
            notif.className = 'flash flash-success';
            notif.innerText = msg;
            notif.style.marginBottom = '20px';
            area.appendChild(notif);
            setTimeout(() => { notif.remove(); }, 3000);
        }

        async function loadAnalytics() {
            const res = await fetch('/api/analytics');
            const data = await res.json();
            document.getElementById('stat-total').innerText = data.total_tasks;
            document.getElementById('stat-completed').innerText = data.completed_tasks;
            document.getElementById('stat-pending').innerText = data.pending_tasks;
            document.getElementById('stat-percentage').innerText = data.completion_percentage + '%';
        }

        function getPriorityClass(priority) {
            if (priority === 'High') return 'badge-high';
            if (priority === 'Medium') return 'badge-medium';
            return 'badge-low';
        }

        function getStatusClass(status) {
            if (status === 'Completed') return 'badge-completed';
            if (status === 'In Progress') return 'badge-progress';
            return 'badge-pending';
        }

        async function loadTasks() {
            const res = await fetch('/api/tasks');
            const tasks = await res.json();
            const tbody = document.getElementById('tasks-tbody');
            tbody.innerHTML = '';
            
            tasks.forEach(task => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>
                        <div class="task-title">${task.title}</div>
                        <div class="task-description">${task.description}</div>
                    </td>
                    <td><span class="badge ${getPriorityClass(task.priority)}">${task.priority}</span></td>
                    <td><span class="badge ${getStatusClass(task.status)}">${task.status}</span></td>
                    <td>
                        <div class="task-actions">
                            <select onchange="updateStatus(${task.id}, this.value)" class="btn" style="padding: 0.25rem 0.5rem; border: 1px solid #d1d5db; border-radius: 0.375rem; background: white; font-size: 0.875rem;">
                                <option value="Pending" ${task.status === 'Pending' ? 'selected' : ''}>Pending</option>
                                <option value="In Progress" ${task.status === 'In Progress' ? 'selected' : ''}>In Progress</option>
                                <option value="Completed" ${task.status === 'Completed' ? 'selected' : ''}>Completed</option>
                            </select>
                            <button onclick="deleteTask(${task.id})" class="btn btn-danger">Delete</button>
                        </div>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        async function submitNewTask() {
            const title = document.getElementById('title').value;
            const description = document.getElementById('description').value;
            const priority = document.getElementById('priority').value;
            const status = document.getElementById('status').value;

            if(!title) {
                alert('Task title is required!');
                return;
            }

            await fetch('/api/tasks', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ title, description, priority, status })
            });

            document.getElementById('add-task-form').reset();
            loadTasks();
            loadAnalytics();
        }

        async function deleteTask(id) {
            if(confirm('Are you sure you want to delete this task?')) {
                await fetch('/api/tasks/' + id, { method: 'DELETE' });
                loadTasks();
                loadAnalytics();
            }
        }

        async function updateStatus(id, newStatus) {
            await fetch('/api/tasks/' + id, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ status: newStatus })
            });
            loadTasks();
            loadAnalytics();
        }

        // Initial Load
        loadTasks();
        loadAnalytics();

        try {
            const socket = io();
            socket.on('connect', function() {
                console.log('Connected to WebSocket');
            });
            socket.on('task_updated', function(data) {
                console.log(data.message);
                showNotification(data.message);
                loadTasks();
                loadAnalytics();
            });
        } catch(err) {
            console.error('Socket.io failed to initialize:', err);
        }
    </script>
</body>
</html>
